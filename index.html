<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="SARA, fashion brand, clothing collections, minimalist fashion">
  <meta name="description" content="Explore the latest SARA clothing collections for men and women.">
  <title>SARA</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="nav">
    <button class="burger" id="burgerBtn" aria-label="Open menu">
      <span></span><span></span>
    </button>
  </header>

  <a href="home.html" class="header-logo">SARA</a>
  
  <div class="menu" id="menu" aria-hidden="true">
    <div class="menu-panel">
      <div class="menu-logo">SARA</div>

      <nav class="menu-links">
        <a href="women.html">WOMEN</a>
        <a href="men.html">MEN</a>
        <a href="about.html">ABOUT</a>
        <a href="contact.html">CONTACT</a>
        <a href="faq.html">FAQ</a>
      </nav>
    </div>
  </div>

  <section class="hero">
    <div class="hero-title-wrap">
      <h1 class="hero-title">SARA</h1>
    </div>

    <div class="hero-images">
      <div class="hero-img"></div>
      <div class="hero-img"></div>
      <div class="hero-img"></div>
    </div>
  </section>

  <main class="main">
    <section class="end-of-hero">
      <h2>Check our new collections</h2>
      <p>
        Spring 2026 is here. Explore our latest arrivals
      </p>
    </section>
  </main>

  <footer class="footer">
    <a class="footer-logo" href="home.html">SARA</a>

    <div class="footer-links">
      <a href="./about.html">About</a>
      <a href="./contact.html">Contact</a>
      <a href="./faq.html">FAQ</a>
    </div>

    <p class="footer-copy">© 2026 SARA. All rights reserved.</p>
  </footer>

  <script>
    const burgerBtn = document.getElementById("burgerBtn");
    const menu = document.getElementById("menu");
    const menuClose = document.getElementById("menuClose");

    function openMenu() {
      menu.classList.add("open");
      menu.setAttribute("aria-hidden", "false");
    }

    function closeMenu() {
      menu.classList.remove("open");
      menu.setAttribute("aria-hidden", "true");
    }

    function toggleMenu() {
      menu.classList.contains("open") ? closeMenu() : openMenu();
    }

    burgerBtn.addEventListener("click", toggleMenu);

    if (menuClose) {
      menuClose.addEventListener("click", closeMenu);
    }

    menu.addEventListener("click", (e) => {
      if (e.target === menu) closeMenu();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeMenu();
    });
  </script>
</body>
</html>
